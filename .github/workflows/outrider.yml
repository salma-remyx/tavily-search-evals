name: Outrider

on:
  workflow_dispatch:
    inputs:
      pin-arxiv:
        description: 'Optional arxiv_id to implement directly (bypass selection).'
        required: false
        default: ''
      publish:
        description: 'pr (default) or branch — branch mode produces a fork branch without opening PR/Issue.'
        required: false
        default: 'pr'
      provider:
        description: 'anthropic (default) or zai for GLM.'
        type: choice
        required: false
        default: 'anthropic'
        options:
          - anthropic
          - zai
      model:
        description: 'Model name (empty = provider default).'
        required: false
        default: ''

      claude-timeout:
        description: 'Wall-clock seconds for Claude Code implementation (raise for slow GLM runs).'
        required: false
        default: '1800'

      lead-content:
        description: 'Scoped refinement spec: verbatim text or URL (Linear fetched server-side; other URLs via session WebFetch).'
        required: false
        default: ''

      start-from-ref:
        description: 'Branch/ref to start the coding session from (refine on top of a prior draft).'
        required: false
        default: ''

      staged-synthesis:
        description: 'Run the research phase (arxiv HTML + reference-impl clone) before coding.'
        required: false
        default: 'false'

      mode:
        description: 'recommend (default) | fidelity | convention | test | issue-convention | weekly-summary'
        required: false
        default: 'recommend'

      pr-number:
        description: 'PR number for chain phases (fidelity/convention/test).'
        required: false
        default: ''

concurrency:
  group: outrider
  cancel-in-progress: false

jobs:
  recommend:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      REMYX_API_KEY: ${{ secrets.REMYX_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure provider auth
        shell: bash
        env:
          ANTHROPIC_API_KEY_SECRET: ${{ secrets.ANTHROPIC_API_KEY }}
          ZAI_API_KEY_SECRET: ${{ secrets.ZAI_API_KEY }}
          MODEL_INPUT: ${{ inputs.model }}
        run: |
          if [ "${{ inputs.provider }}" = "zai" ]; then
            echo "ANTHROPIC_AUTH_TOKEN=$ZAI_API_KEY_SECRET" >> "$GITHUB_ENV"
          else
            echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY_SECRET" >> "$GITHUB_ENV"
          fi
          if [ -n "$MODEL_INPUT" ]; then
            echo "ANTHROPIC_MODEL=$MODEL_INPUT" >> "$GITHUB_ENV"
          fi
      - name: Mint Remyx bot token
        id: remyx-bot
        shell: bash
        run: |
          token="$(curl -sf -X POST -H "Authorization: Bearer ${{ secrets.REMYX_API_KEY }}" -H "Content-Type: application/json" -d "{\"repo\": \"${{ github.repository }}\"}" "https://engine.remyx.ai/api/v1.0/github/installation-token" | python3 -c "import sys, json; print(json.load(sys.stdin).get('token', ''))")" || token=""
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"
      - uses: remyxai/outrider@v1
        with:
          interest-id: '7a721f95-8772-4e55-bc30-3d29750cd28d'
          guardrails-allowlist: '**/*.lock'
          github-token: ${{ steps.remyx-bot.outputs.token }}
          pin-arxiv: ${{ inputs.pin-arxiv }}
          publish: ${{ inputs.publish }}
          model-base-url: ${{ inputs.provider == 'zai' && 'https://api.z.ai/api/anthropic' || '' }}
          lead-content: ${{ inputs.lead-content }}
          start-from-ref: ${{ inputs.start-from-ref }}
          staged-synthesis: ${{ inputs.staged-synthesis }}
          mode: ${{ inputs.mode }}
          pr-number: ${{ inputs.pr-number }}
          claude-timeout: ${{ inputs.claude-timeout }}
